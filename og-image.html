<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #0F3460 100%);
    color: #fff;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 80px;
  }
  .glow {
    position: absolute;
    top: -40%; right: -20%;
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(233,69,96,0.35) 0%, transparent 60%);
    pointer-events: none;
  }
  .glow2 {
    position: absolute;
    bottom: -30%; left: -10%;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(15,52,96,0.6) 0%, transparent 60%);
    pointer-events: none;
  }
  .content { position: relative; z-index: 2; max-width: 780px; }
  .brand {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
  }
  .logo {
    width: 56px; height: 56px;
    background: #E94560;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900; color: #fff;
    box-shadow: 0 8px 24px rgba(233,69,96,0.5);
  }
  .brand-name {
    font-size: 26px; font-weight: 900;
    letter-spacing: -0.5px;
  }
  .brand-name span { color: #E94560; }
  .badge {
    display: inline-block;
    background: rgba(233,69,96,0.18);
    color: #ff7a95;
    border: 1px solid rgba(233,69,96,0.45);
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 16px; font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: 0.3px;
  }
  h1 {
    font-size: 64px;
    font-weight: 900;
    line-height: 1.18;
    letter-spacing: -1.5px;
    margin-bottom: 24px;
  }
  h1 .accent { color: #E94560; }
  .sub {
    font-size: 22px;
    color: rgba(255,255,255,0.72);
    line-height: 1.6;
    font-weight: 500;
    margin-bottom: 32px;
  }
  .chips { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 15px; font-weight: 600;
    color: rgba(255,255,255,0.92);
  }
  .right {
    position: absolute;
    right: 80px; bottom: 60px;
    z-index: 2;
    text-align: right;
  }
  .stores {
    display: flex; gap: 10px;
    font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.65);
    letter-spacing: 0.5px;
  }
  .stores span { padding: 8px 14px; background: rgba(255,255,255,0.06); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="brand">
      <div class="logo">R</div>
      <div class="brand-name">리<span>클림</span> · RECLIM</div>
    </div>
    <div class="badge">Indoor Climbing All-in-One</div>
    <h1>클라이밍 영상 촬영부터<br>편집까지, <span class="accent">앱 하나로</span></h1>
    <p class="sub">실내 볼더링 클라이머를 위한 올인원 세션 트래커.<br>촬영 · 편집 · 기록 · 통계 · 공유까지 한 번에.</p>
    <div class="chips">
      <div class="chip">초광각 0.6x</div>
      <div class="chip">암장 자동 인식</div>
      <div class="chip">구간별 속도 조절</div>
      <div class="chip">클라우드 백업</div>
    </div>
  </div>
  <div class="right">
    <div class="stores">
      <span>App Store</span>
      <span>Google Play</span>
    </div>
  </div>
</body>
</html>
